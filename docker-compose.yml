services:
  postgres:
    image: postgres:16
    container_name: dayu-topology-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dayu_topology
      POSTGRES_USER: dayu
      POSTGRES_PASSWORD: dayu
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "55432:5432"
    volumes:
      - dayu_topology_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dayu -d dayu_topology"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  dayu_topology_pgdata:
